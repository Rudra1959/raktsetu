name: raktsetu
description: "RaktSetu — Smart Blood Allocation Platform. Connects blood donors with patients in real-time using intelligent matching, location-aware services, and AI-powered demand forecasting."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Google / Material ──
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  material_design_icons_flutter: ^7.0.7296

  # ── Firebase Core ──
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  firebase_messaging: ^15.2.1
  firebase_analytics: ^11.4.1
  firebase_crashlytics: ^4.3.1
  firebase_storage: ^12.4.1
  firebase_app_check: ^0.3.2+1
  firebase_remote_config: ^5.3.1

  # ── Google Maps & Location ──
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # ── Google Sign-In ──
  google_sign_in: ^6.2.2

  # ── Notifications ──
  flutter_local_notifications: ^18.0.1

  # ── State Management ──
  provider: ^6.1.2

  # ── Networking ──
  http: ^1.2.2

  # ── Charts & Visualization ──
  fl_chart: ^0.70.2

  # ── Local Storage ──
  shared_preferences: ^2.3.4

  # ── Animations ──
  flutter_animate: ^4.5.0

  # ── Utilities ──
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  # fonts:
