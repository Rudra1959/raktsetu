# ===========================
# RaktSetu — Google Cloud Build CI/CD
# Triggers on PR merge to develop (staging) or main (prod)
# ===========================

steps:
  # ── Step 1: Install Flutter SDK ──
  - name: 'ghcr.io/nicholaschiang/flutter:stable'
    entrypoint: 'flutter'
    args: ['--version']
    id: 'flutter-version'

  # ── Step 2: Get Flutter dependencies ──
  - name: 'ghcr.io/nicholaschiang/flutter:stable'
    entrypoint: 'flutter'
    args: ['pub', 'get']
    id: 'flutter-pub-get'
    waitFor: ['flutter-version']

  # ── Step 3: Run Flutter Analyzer ──
  - name: 'ghcr.io/nicholaschiang/flutter:stable'
    entrypoint: 'flutter'
    args: ['analyze', '--no-fatal-infos']
    id: 'flutter-analyze'
    waitFor: ['flutter-pub-get']

  # ── Step 4: Run Flutter Tests ──
  - name: 'ghcr.io/nicholaschiang/flutter:stable'
    entrypoint: 'flutter'
    args: ['test', '--coverage']
    id: 'flutter-test'
    waitFor: ['flutter-pub-get']

  # ── Step 5: Build Flutter APK (Android) ──
  - name: 'ghcr.io/nicholaschiang/flutter:stable'
    entrypoint: 'flutter'
    args: ['build', 'apk', '--release']
    id: 'flutter-build-apk'
    waitFor: ['flutter-analyze', 'flutter-test']

  # ── Step 6: Install Cloud Functions dependencies ──
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']
    dir: 'functions'
    id: 'functions-install'

  # ── Step 7: Lint Cloud Functions ──
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'lint']
    dir: 'functions'
    id: 'functions-lint'
    waitFor: ['functions-install']

  # ── Step 8: Deploy Firebase (functions + rules + hosting) ──
  - name: 'gcr.io/$PROJECT_ID/firebase'
    args: ['deploy', '--project=${_FIREBASE_PROJECT}', '--only', 'functions,firestore,hosting']
    id: 'firebase-deploy'
    waitFor: ['functions-lint', 'flutter-build-apk']

substitutions:
  _FIREBASE_PROJECT: 'raktsetu-staging'

timeout: '1800s' # 30 min max

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
